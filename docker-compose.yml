version: "3.8"

services:
  # FastAPI summarization (video + PDF)
  summarize-api:
    build: ./python-ai-service
    container_name: meetza-summarize-api
    restart: unless-stopped
    environment:
      # Must match backend SUMMARIZE_API_KEY; override in .env for production.
      - API_KEY=${SUMMARIZE_API_KEY:-dev-meetza-summarize-key}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-medium}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE=${WHISPER_COMPUTE:-int8}
    ports:
      - "0.0.0.0:${SUMMARIZE_API_PORT:-8000}:8000"
    volumes:
      - ./python-ai-service/cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - meetza-network

  # Backend API Service
  backend:
    build: .
    container_name: meetza-backend
    restart: unless-stopped
    depends_on:
      summarize-api:
        condition: service_healthy
    ports:
      # Expose port 4000 on all network interfaces (accessible from anywhere)
      # Format: "host_port:container_port" or "0.0.0.0:host_port:container_port"
      - "0.0.0.0:${PORT:-4000}:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DOCKER_ENV=true
      - IN_DOCKER=true
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - CALLBACK_URL=${CALLBACK_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      # Inside Docker, use compose service DNS (host .env localhost URLs would fail).
      - SUMMARIZE_API_URL=http://summarize-api:8000/summarize_video
      - SUMMARIZE_PDF_API_URL=http://summarize-api:8000/summarize_pdf
      - SUMMARIZE_API_KEY=${SUMMARIZE_API_KEY:-dev-meetza-summarize-key}
      - SUMMARIZE_API_TIMEOUT_MS=${SUMMARIZE_API_TIMEOUT_MS:-1800000}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - COMPANY_ID=${COMPANY_ID}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - meetza-network

networks:
  meetza-network:
    driver: bridge
