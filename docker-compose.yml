version: "3.8"

services:
  # Backend API Service
  backend:
    build: .
    container_name: meetza-backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      # Expose port 4000 on all network interfaces (accessible from anywhere)
      # Format: "host_port:container_port" or "0.0.0.0:host_port:container_port"
      - "0.0.0.0:${PORT:-4000}:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DOCKER_ENV=true
      - IN_DOCKER=true
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=meetza
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - CALLBACK_URL=${CALLBACK_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - meetza-network

  # Database Service
  db:
    image: mysql:8
    container_name: meetza-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: meetza
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - meetza-network

networks:
  meetza-network:
    driver: bridge

volumes:
  db_data:
